<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Генератор надёжных паролей онлайн</title>
  <meta name="description" content="Создайте случайный пароль заданной длины с цифрами, символами и буквами. Безопасно и бесплатно.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-link">← На главную</a>
    <div class="tool-container">
      <h2>🔐 Генератор паролей</h2>
      <div>
        <label>Длина пароля: <input type="number" id="length" min="4" max="64" value="12"></label>
      </div>
      <div style="margin: 16px 0;">
        <label><input type="checkbox" id="useUpper" checked> Заглавные буквы (A-Z)</label><br>
        <label><input type="checkbox" id="useLower" checked> Строчные буквы (a-z)</label><br>
        <label><input type="checkbox" id="useNumbers" checked> Цифры (0-9)</label><br>
        <label><input type="checkbox" id="useSymbols"> Символы (!@#$%^&*)</label>
      </div>
      <button id="generateBtn">Сгенерировать пароль</button>
      <div class="result-area" style="margin-top:20px; word-break:break-all;">
        <strong>Ваш пароль:</strong><br>
        <span id="passwordResult" style="font-family: monospace; font-size:1.2rem;">—</span>
      </div>
    </div>
    <footer>
      <p>Генерация происходит локально в браузере, пароль не передаётся по сети.</p>
    </footer>
  </div>
  <script>
    function generatePassword() {
      const length = parseInt(document.getElementById('length').value);
      const useUpper = document.getElementById('useUpper').checked;
      const useLower = document.getElementById('useLower').checked;
      const useNumbers = document.getElementById('useNumbers').checked;
      const useSymbols = document.getElementById('useSymbols').checked;
      
      let chars = '';
      if (useUpper) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      if (useLower) chars += 'abcdefghijklmnopqrstuvwxyz';
      if (useNumbers) chars += '0123456789';
      if (useSymbols) chars += '!@#$%^&*()_+[]{}|;:,.<>?';
      
      if (chars === '' || length < 1) {
        document.getElementById('passwordResult').textContent = 'Выберите хотя бы один тип символов';
        return;
      }
      
      let password = '';
      for (let i = 0; i < length; i++) {
        const randomIndex = Math.floor(Math.random() * chars.length);
        password += chars[randomIndex];
      }
      document.getElementById('passwordResult').textContent = password;
    }
    document.getElementById('generateBtn').addEventListener('click', generatePassword);
    generatePassword(); // при загрузке сразу сгенерируем
  </script>
</body>
</html>
